<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nosso Jogo</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Courier New", monospace;
  color: #00aaff;
  overflow: hidden;
}

/* Scanlines */
body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 2px,
    transparent 4px
  );
}

/* Fade */
.fade {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  opacity: 0;
  pointer-events: none;
  transition: 1s;
}

.fade.active {
  opacity: 1;
}

/* Menu */
.menu {
  text-align: center;
}

.gameTitle {
  text-align: center;
  position: absolute;
  top: 40px;
  font-size: 32px;
  text-shadow: 0 0 15px #00aaff;
}

.title {
  text-align: center;
  font-size: 24px;
  margin-bottom: 30px;
  text-shadow: 0 0 10px #00aaff;
}

.option {
  font-size: 20px;
  margin: 10px 0;
}

.selected {
  color: white;
  text-shadow: 0 0 10px white;
  transform: scale(1.1);
}

.locked {
  color: #555;
}

/* Loading */
.loading {
  display: none;
  font-size: 20px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}
img{
  margin-right: 50px;
}
</style>
</head>

<body>
<img src="imagens/shrek-shrek-meme.gif" alt="" width="200px">

<div class="fade" id="fade"></div>

<!-- MENU PRINCIPAL -->
<div class="menu" id="mainMenu">
  <div class="title">▶ SYSTEM MENU</div>
  <div class="option selected">Jogar</div>
  <div class="option">Configurações</div>
  <div class="option">Sair</div>
</div>

<!-- MENU DE JOGO -->
<div class="menu" id="playMenu" style="display:none;">
  <div class="title">▶ SELECT MODE</div>
  <div class="option selected">Novo Jogo</div>
  <div class="option">Continuar</div>
  <div class="option">Voltar</div>
</div>

<!-- MENU DE FASES -->
<div class="menu" id="phaseMenu" style="display:none;">
  <div class="title">▶ SELECT STAGE</div>
  <div class="option selected">Fase 1</div>
  <div class="option locked">Fase 2 🔒</div>
  <div class="option locked">Fase 3 🔒</div>
  <div class="option locked">Fase 4 🔒</div>
  <div class="option">Voltar</div>
</div>

<!-- CONFIG -->
<div class="menu" id="configMenu" style="display:none;">
  <div class="title">▶ SETTINGS</div>
  <div class="option selected">Volume</div>
  <div class="option">Brilho</div>
  <div class="option">Voltar</div>
</div>

<div class="loading" id="loading">Carregando...</div>

<!-- Sons -->
<audio id="moveSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="selectSound" src="https://assets.mixkit.co/active_storage/sfx/2570/2570-preview.mp3"></audio>

<script>
let currentMenu = "mainMenu";
let index = 0;

const fade = document.getElementById("fade");
const loading = document.getElementById("loading");

const moveSound = document.getElementById("moveSound");
const selectSound = document.getElementById("selectSound");

function getOptions() {
  return document.querySelectorAll(`#${currentMenu} .option`);
}

function updateMenu() {
  const options = getOptions();
  options.forEach((opt, i) => {
    opt.classList.remove("selected");
    if (i === index) opt.classList.add("selected");
  });
}

function switchMenu(menuId) {
  document.getElementById(currentMenu).style.display = "none";
  currentMenu = menuId;
  document.getElementById(currentMenu).style.display = "block";
  index = 0;
  updateMenu();
}

function fakeLoading(callback) {
  fade.classList.add("active");
  setTimeout(() => loading.style.display = "block", 500);

  setTimeout(() => {
    loading.style.display = "none";
    fade.classList.remove("active");
    callback();
  }, 2000);
}

document.addEventListener("keydown", (e) => {
  const options = getOptions();

  if (e.key === "ArrowDown") {
    index = (index + 1) % options.length;
    moveSound.currentTime = 0;
    moveSound.play();
  }

  if (e.key === "ArrowUp") {
    index = (index - 1 + options.length) % options.length;
    moveSound.currentTime = 0;
    moveSound.play();
  }

  if (e.key === "Enter") {
    selectSound.currentTime = 0;
    selectSound.play();

    const choice = options[index].textContent;

    if (currentMenu === "mainMenu") {
      if (choice === "Jogar") fakeLoading(() => switchMenu("playMenu"));
      if (choice === "Configurações") switchMenu("configMenu");
      if (choice === "Sair") alert("Desligando sistema...");
    }

    else if (currentMenu === "playMenu") {
      if (choice === "Novo Jogo") fakeLoading(() => switchMenu("phaseMenu"));
      if (choice === "Continuar") alert("Nenhum save encontrado...");
      if (choice === "Voltar") switchMenu("mainMenu");
    }

    else if (currentMenu === "phaseMenu") {

  if (choice.includes("Fase 1")) {
    fakeLoading(() => {
      window.location.href = "fase01.html";
    });
  }

  else if (choice.includes("🔒")) {
    alert("Fase bloqueada...");
  }

  else if (choice === "Voltar") {
    switchMenu("playMenu");
  }

}

    else if (currentMenu === "configMenu") {
      if (choice === "Voltar") switchMenu("mainMenu");
      else alert(choice + " ajustado!");
    }
  }

  updateMenu();
});
</script>

</body>
</html>

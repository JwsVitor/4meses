<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Camadas do Jogo 💙</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle, #001f3f, #000814);
  font-family: "Courier New", monospace;
  color: #cce6ff;
  text-align: center;
  overflow: hidden;
}

body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity: 0.25;
}

.container {
  z-index: 2;
  max-width: 700px;
  padding: 25px;
  border: 2px solid rgba(173,216,230,0.2);
  background: rgba(0,0,20,0.5);
  box-shadow: 0 0 20px rgba(0, 140, 255, 0.4);
}

h1 {
  font-size: 26px;
  text-shadow: 0 0 8px #00aaff;
}

.layer {
  margin: 10px 0;
  font-size: 14px;
  opacity: 0.85;
}

.highlight {
  color: #66ccff;
  text-shadow: 0 0 6px #66ccff;
}

.question-box {
  margin-top: 20px;
}

/* BOTÕES */
#opcoes button {
  display: block;
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  background: transparent;
  border: 1px solid #66ccff;
  color: #66ccff;
  cursor: pointer;
  transition: 0.3s;
}

#opcoes button:hover {
  background: #66ccff;
  color: black;
  box-shadow: 0 0 10px #66ccff;
}

#opcoes button:active {
  transform: scale(0.95);
}

/* SELEÇÃO PELO TECLADO */
.selected {
  background: #66ccff;
  color: black !important;
  box-shadow: 0 0 10px #66ccff;
}
    img{
      margin: -25px;
      margin-top: 3px;
    }
</style>
</head>

<body>

<div class="container">

<h1>Você lembra?</h1>
<img src="imagens/source.gif" alt="" width="150px">

<hr style="opacity:0.2; margin:20px 0;">

<h2>Camada 1</h2>

<div class="question-box">
  <p id="pergunta"></p>
  <div id="opcoes"></div>
</div>

</div>

<!-- SONS -->
<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="correctSound" src="https://assets.mixkit.co/active_storage/sfx/3207/3207-preview.mp3"></audio>
<audio id="errorSound" src="https://assets.mixkit.co/active_storage/sfx/2947/2947-preview.mp3"></audio>

<script>
const perguntas = [
  "Onde foi que nos conhecemos?",
  "Onde foi nosso primeiro date?",
  "Nosso primeiro beijo foi onde?",
  "Que dia eu te pedi em namoro?",
  "Qual é o nosso lugar marcante?"
];

const dados = [
  { opcoes: ["Tinder","Instagram","Shopping","Ramiro"], correta: "Tinder" },
  { opcoes: ["cebo","Sebo","çebo","zebo"], correta: "Sebo" },
  { opcoes: ["Ramiro","Praia","velório","Cinema"], correta: "Ramiro" },
  { opcoes: ["22/11","23/11","24/11","25/11"], correta: "23/11" },
  { opcoes: ["Ramiro","Shopping","Curt hering","Casa"], correta: "Ramiro" }
];

let etapa = 0;
let selectedIndex = 0;

const clickSound = document.getElementById("clickSound");
const correctSound = document.getElementById("correctSound");
const errorSound = document.getElementById("errorSound");

function carregarPergunta() {
  selectedIndex = 0;

  document.getElementById("pergunta").innerText = perguntas[etapa];
  const opcoesDiv = document.getElementById("opcoes");
  opcoesDiv.innerHTML = "";

  dados[etapa].opcoes.forEach((opcao, i) => {
    const btn = document.createElement("button");
    btn.innerText = opcao;

    btn.onclick = () => responder(opcao, btn);

    if (i === 0) btn.classList.add("selected");

    opcoesDiv.appendChild(btn);
  });
}

function atualizarSelecao() {
  const botoes = document.querySelectorAll("#opcoes button");
  botoes.forEach(btn => btn.classList.remove("selected"));
  botoes[selectedIndex].classList.add("selected");
}

function responder(resposta, botao) {

  clickSound.currentTime = 0;
  clickSound.play();

  const correta = dados[etapa].correta;

  if (resposta === correta) {

    correctSound.currentTime = 0;
    correctSound.play();

    botao.style.background = "#66ccff";
    botao.style.color = "black";

    setTimeout(() => {
      etapa++;

      if (etapa < perguntas.length) {
        carregarPergunta();
      } else {
        document.querySelector(".container").innerHTML = `
          <h1>Camada concluída</h1>
          <p>Você conseguiu… 💙</p>
        `;

        setTimeout(() => {
          window.location.href = "01.html";
        }, 2000);
      }

    }, 600);

  } else {

    errorSound.currentTime = 0;
    errorSound.play();

    botao.style.background = "red";
    botao.style.color = "white";

    setTimeout(() => {
      botao.style.background = "transparent";
      botao.style.color = "#66ccff";
    }, 500);
  }
}

/* CONTROLE TECLADO */
document.addEventListener("keydown", (e) => {

  const botoes = document.querySelectorAll("#opcoes button");

  if (e.key === "ArrowDown") {
    selectedIndex = (selectedIndex + 1) % botoes.length;
    clickSound.play();
    atualizarSelecao();
  }

  if (e.key === "ArrowUp") {
    selectedIndex = (selectedIndex - 1 + botoes.length) % botoes.length;
    clickSound.play();
    atualizarSelecao();
  }

  if (e.key === "Enter") {
    botoes[selectedIndex].click();
  }

});

carregarPergunta();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fase 3</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  color: #ccc;
  font-family: "Courier New", monospace;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* scanlines */
body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    rgba(255,255,255,0.03) 1px,
    transparent 2px
  );
}

.container {
  width: 700px;
  padding: 20px;
  border: 1px solid #444;
  background: rgba(0,0,0,0.8);
}

.titulo {
  margin-bottom: 20px;
  color: #888;
}

.livro {
  padding: 10px;
  border: 1px solid #333;
  margin: 5px 0;
}

.selected {
  border: 1px solid #66ccff;
  box-shadow: 0 0 10px #66ccff;
}

input {
  margin-top: 20px;
  width: 100%;
  padding: 10px;
  background: black;
  border: 1px solid #555;
  color: white;
}
</style>
</head>

<body>

<div class="container">

<div class="titulo">[Arquivos recuperados]</div>

<div class="livro selected">O Sopro de Vida</div>
<div class="livro">Coração</div>
<div class="livro">Cavaleiro Solitário</div>
<div class="livro">Blade Runner</div>

<div id="texto" style="margin-top:20px;"></div>

<input id="resposta" placeholder="Junte as palavras...">

</div>

<!-- SONS -->
<audio id="moveSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="selectSound" src="https://assets.mixkit.co/active_storage/sfx/2570/2570-preview.mp3"></audio>

<script>
let index = 0;

const livros = document.querySelectorAll(".livro");
const texto = document.getElementById("texto");

const pistas = [
  "Algo que existe, mas não pode ser tocado...",
  "Aquilo que bate, mas não pede permissão...",
  "Seguir sozinho, mesmo quando tudo pesa...",
  "Memórias podem mentir..."
];

const respostasCorretas = ["alma", "amor", "coragem"];

const moveSound = document.getElementById("moveSound");
const selectSound = document.getElementById("selectSound");

function atualizar() {
  livros.forEach(l => l.classList.remove("selected"));
  livros[index].classList.add("selected");
}

document.addEventListener("keydown", (e) => {

  if (e.key === "ArrowDown") {
    index = (index + 1) % livros.length;
    moveSound.play();
  }

  if (e.key === "ArrowUp") {
    index = (index - 1 + livros.length) % livros.length;
    moveSound.play();
  }

  if (e.key === "Enter") {
    selectSound.play();
    texto.innerText = pistas[index];
  }

  atualizar();
});

// verificar resposta digitada
document.getElementById("resposta").addEventListener("change", (e) => {
  let valor = e.target.value.toLowerCase();

  let acertos = respostasCorretas.every(r => valor.includes(r));

  if (acertos) {
    alert("Você entendeu...");
    window.location.href = "final.html";
  } else {
    alert("Algo não se encaixa...");
  }
});
</script>

</body>
</html>
